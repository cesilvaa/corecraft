services:
  corecraft-v1:
    build: ./atividade-1
    container_name: corecraft-v1
    ports:
      - "3000:3000"
    volumes:
      - ./atividade-1:/app
      - bundle_cache:/usr/local/bundle
    env_file:
      - ./atividade-1/.env.${RAILS_ENV:-development}
    environment:
      - RAILS_ENV=${RAILS_ENV:-development}
    networks:
      - corecraft
      - bitcoin

  corecraft-v2:
    build: ./atividade-2
    container_name: corecraft-v2
    ports:
      - "3000:3000"
    volumes:
      - ./atividade-2:/app
      - bundle_cache_v2:/usr/local/bundle
    env_file:
      - ./atividade-2/.env.${RAILS_ENV:-development}
    environment:
      - RAILS_ENV=${RAILS_ENV:-development}
    networks:
      - corecraft
      - bitcoin

volumes:
  bundle_cache:
  bundle_cache_v2:

networks:
  corecraft:
    driver: bridge
  bitcoin:
    external: true
    name: ${BITCOIN_DOCKER_NETWORK:?Defina BITCOIN_DOCKER_NETWORK no arquivo .env da raiz (veja .env.example)}
