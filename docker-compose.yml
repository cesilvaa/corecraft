services:
  bitcoin-regtest:
    build: ./bitcoin-regtest
    container_name: bitcoin-regtest
    volumes:
      - bitcoin_regtest_install:/opt/bitcoin
      - ./bitcoin-regtest/data:/workspace/bitcoin
    env_file: .env
    networks:
      - corecraft

  bitcoin-signet:
    build: ./bitcoin-signet
    container_name: bitcoin-signet
    volumes:
      - bitcoin_signet_install:/opt/bitcoin
      - ./bitcoin-signet/data:/workspace/bitcoin
    env_file: .env
    networks:
      - corecraft

  corecraft-v1:
    build: ./atividade-1
    container_name: corecraft-v1
    ports:
      - "3000:3000"
    volumes:
      - ./atividade-1:/app
      - bundle_cache:/usr/local/bundle
    env_file:
      - ./atividade-1/.env.${RAILS_ENV:-development}
    environment:
      - RAILS_ENV=${RAILS_ENV:-development}
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD}
    networks:
      - corecraft

  corecraft-v2:
    build: ./atividade-2
    container_name: corecraft-v2
    ports:
      - "3000:3000"
    volumes:
      - ./atividade-2:/app
      - bundle_cache_v2:/usr/local/bundle
    env_file:
      - ./atividade-2/.env.${RAILS_ENV:-development}
    environment:
      - RAILS_ENV=${RAILS_ENV:-development}
      - BITCOIN_RPC_USER=${BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASSWORD=${BITCOIN_RPC_PASSWORD}
    networks:
      - corecraft

volumes:
  bundle_cache:
  bundle_cache_v2:
  bitcoin_regtest_install:
  bitcoin_signet_install:

networks:
  corecraft:
    driver: bridge
